<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#5a3ddd"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <g transform="rotate(-12 256 256)" filter="url(#shadow)">
    <rect x="146" y="146" width="220" height="280" rx="22" fill="#ffffff" fill-opacity="0.35"/>
  </g>

  <g transform="rotate(8 256 256)" filter="url(#shadow)">
    <rect x="146" y="146" width="220" height="280" rx="22" fill="#ffffff"/>
    <text x="256" y="320" font-family="Helvetica, Arial, sans-serif" font-size="190" font-weight="800" fill="#5a3ddd" text-anchor="middle">A</text>
  </g>
</svg>
