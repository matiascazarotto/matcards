<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>matcards · Picker de ícone</title>
  <style>
    :root {
      --bg: #0a0a0c;
      --surface: #141417;
      --surface-2: #1c1c20;
      --text: #f4f4f6;
      --text-dim: #8e8e96;
      --text-mute: #5a5a64;
      --accent: #8b7cff;
      --border: rgba(255,255,255,0.06);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 2rem 1rem 4rem;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, "SF Pro Text", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 920px; margin: 0 auto; }
    h1 {
      font-size: 1.75rem;
      letter-spacing: -0.03em;
      margin: 0 0 0.5rem;
      font-weight: 600;
    }
    .subtitle { color: var(--text-dim); margin-bottom: 2.5rem; font-size: 0.95rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.5rem;
    }
    .variant {
      background: var(--surface);
      border-radius: 18px;
      padding: 1.5rem;
      border: 1px solid var(--border);
    }
    .variant-id {
      font-family: ui-monospace, Menlo, monospace;
      font-size: 0.78rem;
      color: var(--text-mute);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }
    .variant h2 {
      margin: 0 0 0.5rem;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .variant p {
      margin: 0 0 1.25rem;
      color: var(--text-dim);
      font-size: 0.88rem;
      line-height: 1.5;
    }
    .previews {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .preview-large {
      width: 144px;
      height: 144px;
      flex-shrink: 0;
    }
    .preview-large svg {
      width: 100%;
      height: 100%;
      border-radius: 32px;
      display: block;
    }
    .preview-small {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .preview-small > div {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .preview-small svg {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      display: block;
    }
    .preview-small svg.tiny {
      width: 32px;
      height: 32px;
      border-radius: 7px;
    }
    .preview-small .scale-label {
      color: var(--text-mute);
      font-size: 0.72rem;
      font-family: ui-monospace, Menlo, monospace;
    }
    .home-bg {
      background: linear-gradient(135deg, #1a1a2e, #2a2a4a);
      padding: 12px;
      border-radius: 16px;
      display: inline-flex;
      gap: 8px;
    }
    .home-bg.light {
      background: linear-gradient(135deg, #e0e5f0, #f7f8fa);
    }
    footer {
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 0.88rem;
    }
    footer code {
      font-family: ui-monospace, Menlo, monospace;
      background: var(--surface-2);
      padding: 1px 6px;
      border-radius: 4px;
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Picker de ícone matcards</h1>
    <p class="subtitle">6 variantes em SVG. Cada uma mostrada em 144×144 (tela inicial grande) e 56×56 (tamanho real no iPhone). Veja qual lê melhor no pequeno e me diz o ID.</p>

    <div class="grid" id="grid"></div>

    <footer>
      Quando escolher, me diga o ID (ex: <code>V1</code>). Eu atualizo <code>icon.svg</code> e o gerador <code>make-icons.html</code>, e você regenera os PNGs.
    </footer>
  </div>

  <script>
    const VARIANTS = [
      {
        id: 'V1',
        name: 'Letra m — mono pura',
        desc: 'Lowercase m em monospace, accent purple suave sobre preto neutro. Mais Apple-Calculator vibe — máxima legibilidade em qualquer tamanho. Vence o teste de 60×60.',
        svg: (size) => `
          <svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <radialGradient id="g${size}_1" cx="80%" cy="15%" r="65%">
                <stop offset="0%" stop-color="#8b7cff" stop-opacity="0.32"/>
                <stop offset="100%" stop-color="#8b7cff" stop-opacity="0"/>
              </radialGradient>
            </defs>
            <rect width="1024" height="1024" fill="#0a0a0c"/>
            <rect width="1024" height="1024" fill="url(#g${size}_1)"/>
            <text x="512" y="700" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="700" font-weight="500" fill="#a594ff" text-anchor="middle">m</text>
          </svg>`
      },
      {
        id: 'V2',
        name: 'Cartão único — letterform',
        desc: 'Um único card centralizado com m grande dentro, sombra suave. Lê como "card de estudo" diretamente. Identidade clara do que o app faz.',
        svg: (size) => `
          <svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="g${size}_2" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#1a1a1e"/>
                <stop offset="100%" stop-color="#0a0a0c"/>
              </linearGradient>
              <filter id="sh${size}_2" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
                <feOffset dy="8"/>
                <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
                <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>
            <rect width="1024" height="1024" fill="url(#g${size}_2)"/>
            <g filter="url(#sh${size}_2)">
              <rect x="232" y="192" width="560" height="640" rx="64" fill="#f4f4f6"/>
            </g>
            <text x="512" y="640" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="440" font-weight="500" fill="#8b7cff" text-anchor="middle">m</text>
          </svg>`
      },
      {
        id: 'V3',
        name: 'Prompt m_ — terminal',
        desc: 'Lowercase m seguido de underscore-cursor. Mono. Vibe de IDE/terminal — sinaliza "programador" sem ser literal demais.',
        svg: (size) => `
          <svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
            <rect width="1024" height="1024" fill="#0a0a0c"/>
            <text x="170" y="660" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="540" font-weight="500" fill="#f4f4f6">m</text>
            <rect x="560" y="600" width="280" height="68" rx="6" fill="#8b7cff"/>
          </svg>`
      },
      {
        id: 'V4',
        name: 'Stack de cards',
        desc: 'Dois cards offset (atrás translúcido, frente branco) com pequeno m. Refinamento da arte atual — menos rotação, menos shadow, paleta neutra.',
        svg: (size) => `
          <svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="g${size}_4" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#181820"/>
                <stop offset="100%" stop-color="#0a0a0c"/>
              </linearGradient>
              <radialGradient id="g${size}_4b" cx="20%" cy="100%" r="70%">
                <stop offset="0%" stop-color="#8b7cff" stop-opacity="0.18"/>
                <stop offset="100%" stop-color="#8b7cff" stop-opacity="0"/>
              </radialGradient>
            </defs>
            <rect width="1024" height="1024" fill="url(#g${size}_4)"/>
            <rect width="1024" height="1024" fill="url(#g${size}_4b)"/>
            <g transform="translate(512 512) rotate(-6) translate(-260 -340)">
              <rect width="520" height="660" rx="60" fill="rgba(255,255,255,0.12)"/>
            </g>
            <g transform="translate(512 512) rotate(4) translate(-260 -340)">
              <rect width="520" height="660" rx="60" fill="#f4f4f6"/>
              <text x="260" y="430" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="320" font-weight="500" fill="#0a0a0c" text-anchor="middle">m</text>
            </g>
          </svg>`
      },
      {
        id: 'V5',
        name: 'Monograma mc',
        desc: 'Letras m + c em mono, kerning tight, accent purple. Sinaliza "matcards" com 2 letras. Lê bem em pequeno como uma marca compacta.',
        svg: (size) => `
          <svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <radialGradient id="g${size}_5" cx="50%" cy="30%" r="70%">
                <stop offset="0%" stop-color="#8b7cff" stop-opacity="0.18"/>
                <stop offset="100%" stop-color="#8b7cff" stop-opacity="0"/>
              </radialGradient>
            </defs>
            <rect width="1024" height="1024" fill="#0a0a0c"/>
            <rect width="1024" height="1024" fill="url(#g${size}_5)"/>
            <text x="512" y="680" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="540" font-weight="500" text-anchor="middle" letter-spacing="-30">
              <tspan fill="#a594ff">m</tspan><tspan fill="#f4f4f6">c</tspan>
            </text>
          </svg>`
      },
      {
        id: 'V6',
        name: 'Card flip — geométrico',
        desc: 'Quadrado dobrado em duas metades (uma sólida, uma translúcida) sugerindo flip de card. Abstrato, sem letra. Mais memorável visualmente como marca.',
        svg: (size) => `
          <svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="g${size}_6" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#181820"/>
                <stop offset="100%" stop-color="#0a0a0c"/>
              </linearGradient>
            </defs>
            <rect width="1024" height="1024" fill="url(#g${size}_6)"/>
            <g transform="translate(512 512)">
              <path d="M -260 -280 L 0 -280 L 0 280 L -260 280 Z" fill="#8b7cff"/>
              <path d="M 0 -280 L 260 -280 L 260 280 L 0 280 Z" fill="rgba(255,255,255,0.92)"/>
              <line x1="0" y1="-280" x2="0" y2="280" stroke="#0a0a0c" stroke-width="6"/>
            </g>
          </svg>`
      }
    ];

    const grid = document.getElementById('grid');
    VARIANTS.forEach((v) => {
      const card = document.createElement('div');
      card.className = 'variant';
      card.innerHTML = `
        <div class="variant-id">${v.id}</div>
        <h2>${v.name}</h2>
        <p>${v.desc}</p>
        <div class="previews">
          <div class="preview-large">${v.svg('lg-' + v.id)}</div>
          <div class="preview-small">
            <div>${v.svg('sm-' + v.id)}<span class="scale-label">56px</span></div>
            <div>${v.svg('xs-' + v.id).replace('<svg', '<svg class="tiny"')}<span class="scale-label">32px</span></div>
          </div>
        </div>
      `;
      grid.appendChild(card);
    });
  </script>
</body>
</html>
